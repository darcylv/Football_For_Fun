<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界杯经典瞬间 - 答题挑战</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 游戏容器：包含所有游戏界面 -->
    <div class="game-container">
        <!-- 开始界面：显示游戏标题和开始按钮 -->
        <div id="start-screen" class="screen active">
            <div class="trophy-icon">🏆</div>
            <h1>世界杯经典瞬间</h1>
            <p class="subtitle">10道题决定你的世界杯观赛席位</p>
            <div class="stadium-preview">⚽🏟️⚽</div>
            <button id="start-btn" class="primary-btn">游戏开始</button>
        </div>

        <!-- 答题界面：显示题目、图片和选项 -->
        <div id="quiz-screen" class="screen">
            <!-- 进度条：显示当前答题进度 -->
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <!-- 题目计数器：显示当前题目和总题数 -->
            <div class="question-counter">
                <span id="current-question">1</span> / <span id="total-questions">10</span>
            </div>
            <!-- 答题内容区域 -->
            <div class="quiz-content">
                <!-- 图片容器：显示题目配图 -->
                <div class="image-container" id="image-container">
                    <img id="question-image" src="" alt="世界杯经典瞬间">
                </div>
                <!-- 题目文本：显示问题内容 -->
                <h2 id="question-text" class="question-text"></h2>
                <!-- 选项容器：动态生成选项按钮 -->
                <div id="options-container" class="options-container"></div>
            </div>
        </div>

        <!-- 结果界面：显示评测结果和评级 -->
        <div id="result-screen" class="screen">
            <!-- 结果图标：显示评级对应的图标 -->
            <div class="result-icon" id="result-icon">🏟️</div>
            <h1 id="result-title">评测结果</h1>
            <!-- 统计信息：显示正确题数和正确率 -->
            <div class="result-stats">
                <div class="stat-item">
                    <span class="stat-label">正确题数</span>
                    <span class="stat-value" id="correct-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">正确率</span>
                    <span class="stat-value" id="final-accuracy">0%</span>
                </div>
            </div>
            <!-- 评级显示：显示用户的观赛席位评级 -->
            <div class="result-rank">
                <span class="rank-label">你的评级</span>
                <span class="rank-value" id="rank-value">普通观众席</span>
            </div>
            <!-- 结果描述：显示评级对应的描述文字 -->
            <p id="result-description" class="result-description"></p>
            <!-- 隐藏成就显示区域 -->
            <div id="achievement-container" class="achievement-container" style="display: none;">
            </div>
            <!-- 操作按钮 -->
            <div class="result-buttons">
                <button id="restart-btn" class="primary-btn">再玩一次</button>
                <button id="create-question-btn" class="secondary-btn">创建问题</button>
            </div>
        </div>

        <!-- 创建问题界面：允许用户创建自己的问题 -->
        <div id="create-question-screen" class="screen">
            <h1>创建问题</h1>
            <p class="subtitle">分享你的世界杯回忆，创建新的问题</p>
            
            <!-- 问题类型选择 -->
            <div class="create-section">
                <h3>选择问题类型</h3>
                <div class="type-selector">
                    <label>
                        <input type="radio" name="question-type" value="text" checked>
                        <span>文字选择题</span>
                    </label>
                    <label>
                        <input type="radio" name="question-type" value="image">
                        <span>图片选择题</span>
                    </label>
                </div>
            </div>
            
            <!-- 文字选择题表单 -->
            <div id="text-question-form" class="create-section">
                <h3>文字选择题</h3>
                <div class="form-group">
                    <label>问题</label>
                    <input type="text" id="text-question" placeholder="请输入问题..." required>
                </div>
                <div class="form-group">
                    <label>问题配图</label>
                    <input type="file" id="text-question-image" accept="image/*">
                    <label class="checkbox-label">
                        <input type="checkbox" id="no-image"> 无配图
                    </label>
                </div>
                <div class="form-group">
                    <label>选项</label>
                    <div id="text-options-container">
                        <div class="option-input">
                            <input type="text" class="option-text" placeholder="选项 1" required>
                            <button type="button" class="remove-option">×</button>
                        </div>
                        <div class="option-input">
                            <input type="text" class="option-text" placeholder="选项 2" required>
                            <button type="button" class="remove-option">×</button>
                        </div>
                    </div>
                    <button type="button" id="add-text-option" class="add-option-btn">+ 添加选项</button>
                </div>
                <div class="form-group">
                    <label>正确答案</label>
                    <div id="text-correct-answers" class="correct-answers-container">
                        <!-- 动态生成复选框 -->
                    </div>
                </div>
            </div>
            
            <!-- 图片选择题表单 -->
            <div id="image-question-form" class="create-section" style="display: none;">
                <h3>图片选择题</h3>
                <div class="form-group">
                    <label>问题</label>
                    <input type="text" id="image-question" placeholder="请输入问题..." required>
                </div>
                <div class="form-group">
                    <label>图片选项</label>
                    <div id="image-options-container">
                        <div class="option-input">
                            <input type="file" class="option-image" accept="image/*" required>
                            <button type="button" class="remove-option">×</button>
                        </div>
                        <div class="option-input">
                            <input type="file" class="option-image" accept="image/*" required>
                            <button type="button" class="remove-option">×</button>
                        </div>
                    </div>
                    <button type="button" id="add-image-option" class="add-option-btn">+ 添加选项</button>
                </div>
                <div class="form-group">
                    <label>正确答案</label>
                    <div id="image-correct-answers" class="correct-answers-container">
                        <!-- 动态生成复选框 -->
                    </div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="create-buttons">
                <button id="cancel-create" class="secondary-btn">取消</button>
                <button id="save-question" class="primary-btn">保存问题</button>
            </div>
        </div>
    </div>
    <!-- 引入JavaScript文件 -->
    <script src="questions_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
