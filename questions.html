<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">世界杯题库管理</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #7f8c8d;
            font-size: 1rem;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .nav-link {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s ease;
        }
        
        .nav-link:hover {
            background: #2980b9;
        }
        
        .language-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .lang-btn {
            padding: 8px 20px;
            border: 2px solid #3498db;
            background: white;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #3498db;
        }
        
        .lang-btn:hover {
            background: #e8f4fd;
        }
        
        .lang-btn.active {
            background: #3498db;
            color: white;
        }
        
        .question-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .question-header h3 {
            color: #2c3e50;
            font-size: 1.3rem;
            margin: 0;
        }
        
        .question-id {
            font-size: 0.75rem;
            color: #6c757d;
            font-weight: normal;
            margin-left: 8px;
        }
        
        .question-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .question-type {
            background: #3498db;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        .question-text {
            font-size: 1.1rem;
            color: #34495e;
            margin-bottom: 20px;
        }
        
        .question-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .options-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px solid transparent;
        }
        
        .option-item.correct {
            border-color: #27ae60;
            background: #e8f5e9;
        }
        
        .option-marker {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .option-marker.normal {
            background: #e9ecef;
            color: #6c757d;
        }
        
        .option-marker.correct {
            background: #27ae60;
            color: white;
        }
        
        .option-content {
            flex: 1;
            font-size: 0.95rem;
            color: #495057;
        }
        
        .option-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .empty-state h3 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .empty-state p {
            color: #7f8c8d;
            font-size: 1rem;
        }
        
        @media (max-width: 600px) {
            .question-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .options-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 data-i18n="title">⚽ 世界杯题库管理</h1>
            <p data-i18n="subtitle">管理和查看所有世界杯题目</p>
        </div>
        
        <div class="language-selector">
            <button id="lang-zh" class="lang-btn active">中文</button>
            <button id="lang-en" class="lang-btn">English</button>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link" data-i18n="backToGame">返回游戏</a>
        </div>
        
        <div id="questions-list">
            <!-- 问题列表将动态生成 -->
        </div>
        
        <div id="empty-state" class="empty-state" style="display: none;">
            <h3 data-i18n="emptyTitle">题库为空</h3>
            <p data-i18n="emptyDesc">还没有创建任何问题</p>
            <a href="index.html" class="nav-link" style="margin-top: 20px;" data-i18n="goCreate">去创建问题</a>
        </div>
    </div>
    
    <script src="questions_data.js"></script>
    <script>
        // 翻译文本映射
        const i18n = {
            zh: {
                pageTitle: '世界杯题库管理',
                title: '⚽ 世界杯题库管理',
                subtitle: '管理和查看所有世界杯题目',
                backToGame: '返回游戏',
                emptyTitle: '题库为空',
                emptyDesc: '还没有创建任何问题',
                goCreate: '去创建问题',
                textQuestion: '文字选择题',
                imageQuestion: '图片选择题',
                question: '问题',
                delete: '删除',
                confirmDelete: '确定要删除这个问题吗？',
                deleted: '问题已从共享题库删除',
                deleteFailed: '删除失败: 无法连接到服务器或权限不足'
            },
            en: {
                pageTitle: 'World Cup Question Bank',
                title: '⚽ World Cup Question Bank',
                subtitle: 'Manage and view all World Cup questions',
                backToGame: 'Back to Game',
                emptyTitle: 'Question Bank Empty',
                emptyDesc: 'No questions created yet',
                goCreate: 'Create Questions',
                textQuestion: 'Text Question',
                imageQuestion: 'Image Question',
                question: 'Question',
                delete: 'Delete',
                confirmDelete: 'Are you sure you want to delete this question?',
                deleted: 'Question deleted from shared question bank',
                deleteFailed: 'Delete failed: Cannot connect to server or insufficient permissions'
            }
        };

        /**
         * 获取翻译文本
         */
        function t(key) {
            const lang = WorldCupQuizData.getCurrentLanguage();
            return i18n[lang][key] || i18n.zh[key] || key;
        }

        /**
         * 获取双语文本的特定语言版本
         */
        function getBilingualText(obj) {
            if (!obj) return '';
            const lang = WorldCupQuizData.getCurrentLanguage();
            if (typeof obj === 'string') return obj;
            return obj[lang] || obj.zh || '';
        }

        /**
         * 更新页面翻译
         */
        function updatePageTranslations() {
            const lang = WorldCupQuizData.getCurrentLanguage();
            
            // 更新 data-i18n 属性的元素
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            
            // 更新按钮状态
            document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            
            // 重新渲染问题列表
            renderQuestions();
        }

        /**
         * 获取问题文本（支持双语或单语文本）
         */
        function getQuestionText(question) {
            if (question.question) {
                return getBilingualText(question.question);
            }
            return '';
        }

        /**
         * 获取选项文本（支持双语或单语文本）
         */
        function getOptionText(option) {
            if (typeof option === 'string') {
                return option;
            }
            return getBilingualText(option);
        }

        // 渲染问题列表
        async function renderQuestions() {
            const questionsList = document.getElementById('questions-list');
            const emptyState = document.getElementById('empty-state');
            
            // 获取所有问题（异步获取云端数据）
            const allQuestions = await WorldCupQuizData.getAllQuestionsAsync();
            
            if (allQuestions.length === 0) {
                questionsList.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            questionsList.style.display = 'block';
            emptyState.style.display = 'none';
            
            questionsList.innerHTML = '';
            
            allQuestions.forEach((question, index) => {
                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';
                
                const type = question.type || 'text';
                const typeText = type === 'text' ? t('textQuestion') : t('imageQuestion');
                
                // 检查是否为用户创建的问题（基础问题有10个）
                const isUserQuestion = index >= 10;
                
                let cardHTML = '<div class="question-header"><h3>' + t('question') + ' ' + (index + 1) + ' <span class="question-id">' + (question.id || 'N/A') + '</span></h3><div class="question-actions"><span class="question-type">' + typeText + '</span>' + (isUserQuestion ? '<button class="delete-btn" onclick="deleteQuestion(' + index + ')">' + t('delete') + '</button>' : '') + '</div></div><div class="question-text">' + getQuestionText(question) + '</div>';
                
                // 添加问题配图
                if (question.image) {
                    cardHTML += '<img src="' + question.image + '" alt="Question image" class="question-image">';
                }
                
                // 添加选项
                cardHTML += '<div class="options-list">';
                question.options.forEach((option, optIndex) => {
                    const isCorrect = question.correct.includes(optIndex);
                    const markerClass = isCorrect ? 'correct' : 'normal';
                    const itemClass = isCorrect ? 'option-item correct' : 'option-item';
                    
                    if (type === 'text') {
                        cardHTML += '<div class="' + itemClass + '"><div class="option-marker ' + markerClass + '">' + String.fromCharCode(65 + optIndex) + '</div><div class="option-content">' + getOptionText(option) + '</div></div>';
                    } else {
                        cardHTML += '<div class="' + itemClass + '"><div class="option-marker ' + markerClass + '">' + (optIndex + 1) + '</div><div class="option-content"><img src="' + option + '" alt="Option ' + (optIndex + 1) + '" class="option-image" style="max-width: 200px; max-height: 120px;"></div></div>';
                    }
                });
                cardHTML += '</div>';
                
                questionCard.innerHTML = cardHTML;
                questionsList.appendChild(questionCard);
            });
        }
        
        // 删除问题
        async function deleteQuestion(index) {
            if (!confirm(t('confirmDelete'))) {
                return;
            }
            
            const allQuestions = await WorldCupQuizData.getAllQuestionsAsync();
            const question = allQuestions[index];
            
            // 只有用户创建的问题才能删除
            if (index >= 10 && question.id) {
                // 使用封装的删除方法（会自动清除缓存）
                const result = await WorldCupQuizData.deleteUserQuestion(question.id);
                
                if (result.success) {
                    alert(t('deleted'));
                } else {
                    alert(t('deleteFailed'));
                }
                
                // 重新渲染页面（缓存已被清除，会获取最新数据）
                renderQuestions();
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 初始化语言设置
            const lang = WorldCupQuizData.getCurrentLanguage();
            document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            updatePageTranslations();

            // 绑定语言切换事件
            document.getElementById('lang-zh').addEventListener('click', () => {
                WorldCupQuizData.setCurrentLanguage('zh');
                updatePageTranslations();
            });

            document.getElementById('lang-en').addEventListener('click', () => {
                WorldCupQuizData.setCurrentLanguage('en');
                updatePageTranslations();
            });
        });
    </script>
</body>
</html>
